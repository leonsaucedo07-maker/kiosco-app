<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Mi Kiosco</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: -apple-system;
      text-align: center;
      background: #111;
      color: white;
      padding: 20px;
    }
    button {
      width: 90%;
      padding: 15px;
      margin: 8px;
      border-radius: 10px;
      font-size: 18px;
    }
  </style>
</head>
<body>

<h1>🧾 Mi Kiosco</h1>
<h2 id="total">Total: $0</h2>
<h3 id="dia">Ventas del día: $0</h3>

<button onclick="agregar(1000)">🥤 Bebidas</button>
<button onclick="agregar(800)">🍪 Galletitas</button>
<button onclick="agregar(500)">🍬 Golosinas</button>
<button onclick="agregar(300)">📦 Varios</button>

<button onclick="cobrar()">💰 COBRAR</button>

<script>
let total = 0;
let ventas = JSON.parse(localStorage.getItem("ventas")) || [];

function agregar(valor){
  total += valor;
  actualizar();
}

function cobrar(){
  if(total === 0) return;
  ventas.push(total);
  localStorage.setItem("ventas", JSON.stringify(ventas));
  total = 0;
  actualizar();
}

function actualizar(){
  document.getElementById("total").innerText = "Total: $" + total;
  let suma = ventas.reduce((a,b)=>a+b,0);
  document.getElementById("dia").innerText = "Ventas del día: $" + suma;
}

actualizar();
</script>

</body>
</html>
